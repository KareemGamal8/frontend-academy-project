<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Frontend Academy</title>

    <style>
      h1 {
        color: #111827;
        font-size: 48px;
      }

      p {
        color: #64748b;
        font-size: 18px;
      }

      .logo {
        color: #7c3aed;
        font-size: 24px;
        font-weight: 700;
        text-decoration: none;
      }

      nav a {
        color: #64748b;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
      }

      .btn {
        color: white;
        background-color: #7c3aed;
        padding: 12px 20px;
        border-radius: 8px;
        text-decoration: none;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 30px;
        align-items: center;
        padding: 20px 80px;
      }

      nav {
        display: flex;
        gap: 24px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 60px;
        margin-top: 50px;
        padding: 40px 80px;
      }

      .hero-content {
        max-width: 550px;
      }

      .hero img {
        width: 500px;
      }
    </style>
  </head>

  <body>
    <header>
      <a class="logo" href="#">Frontend Academy</a>

      <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Learning Path</a>
        <a href="#">Pricing</a>
      </nav>

      <a class="btn" href="#">Enroll Now</a>
    </header>

    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>Master Frontend Development</h1>

          <p>
            Learn HTML, CSS, JavaScript and React by building real-world
            projects.
          </p>

          <a class="btn" href="#">Start Learning</a>
        </div>

        <img src="./assets/hero_developer.png" alt="Frontend Development" />
      </section>
    </main>
  </body>
</html>
