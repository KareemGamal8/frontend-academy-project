<!doctype html>
<html>
  <head>
    <title>Frontend Academy</title>
    <style>
      .logo {
        color: #7c3aed;
        font-size: 24px;
        font-weight: 800;
      }

      a {
        text-decoration: none;
      }

      nav a {
        color: #64748b;
        font-size: 20px;
        font-weight: 600;
      }

      .btn {
        color: #fff;
        background-color: #7c3aed;
        padding: 12px 20px;
        border-radius: 10px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
      }

      nav {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 60px;
        padding: 20px 40px;
      }

      .hero img {
        width: 550px;
      }

      .hero h1 {
        font-size: 48px;
      }

      .hero-content {
        display: flex;
        gap: 10px;
        flex-direction: column;
      }

      .hero-content p {
        color: #64748b;
      }

      .hero-content a {
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="" class="logo">Frontend Academy</a>
      <nav>
        <a href="">Home</a>
        <a href="">Brands</a>
        <a href="">Features</a>
        <a href="">Learning Path</a>
        <a href="">Tracks</a>
        <a href="">Testimonials</a>
        <a href="">Pricing</a>
        <a href="">Contact</a>
      </nav>
      <a href="" class="btn">Enroll Now</a>
    </header>
    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>Master Frontend Development</h1>
          <p>
            Learn HTML, CSS, JavaScript and React by building real-world
            projects.
          </p>
          <a href="" class="btn">Start Learning</a>
        </div>
        <img src="./assets/hero_developer.png" alt="hero" />
      </section>
    </main>
  </body>
</html>
